name: Issue
description: for reporting any issue
labels: ["ISSUE"]
body:
  - type: markdown
    attributes:
      value: "**Welcome to submit a new issue!**\n- Please search in existing issues before continuing.\n- It takes only 3 steps, so please be patient :)"
  - type: checkboxes
    attributes:
      label: "Step 1. Before you submit"
      options:
        - label: I have read the documentation.
          required: true
  - type: textarea
    attributes:
      label: "Step 2. Quick diagnose info"
      description: "Run `./diagnose` inside the repo, and paste the result below."
      value: "<details><summary>Quick diagnose</summary>\n\n```\n<!-- Run `./diagnose` inside the repo, and paste the result here! -->\n```\n\n</details>"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Step 3. Describe the issue"
      value: "\n<!-- Describe your issue here! -->\n\n<details><summary>Logs</summary>\n\n```\n<!-- Put your log content here!-->\n```\n\n</details>"
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Reminder
      options:
        - label: I agree that it's usually impossible for others to help me without my logs.
          required: true
