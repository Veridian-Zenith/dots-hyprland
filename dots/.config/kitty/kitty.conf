# =============================================================================
# Kitty Terminal Configuration
# =============================================================================
# Pywal colors are loaded from ~/.cache/wal/colors-kitty.conf (auto-generated)
# To change colors: change your wallpaper via the Quickshell wallpaper selector
# which runs pywal to regenerate the color scheme.

# Font
font_family      Iosevka Term Slab
font_size 13.0
# Disable common ligatures (calt)
font_features    Iosevka Term Slab -calt
# Render Material Symbols Outlined codepoints (U+e000-U+efff) with the outline font
symbol_map U+e000-U+efff Material Symbols Outlined

# Cursor
cursor_shape beam
cursor_trail 1

# Window
window_padding_width 0
confirm_os_window_close 0
hide_window_decorations yes

# Background transparency (Ctrl+Shift+Plus/Minus to adjust at runtime)
background_opacity 0.75
dynamic_background_opacity yes

# Shell
shell fish
shell_integration enabled

# Copy
map ctrl+c    copy_or_interrupt

# Search (kitty kitten search - live incremental search)
map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0
