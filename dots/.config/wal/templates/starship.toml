# Generated by pywal from your wallpaper palette.
# Colors are inlined from colors.json so the prompt tracks your wallpaper.
# Icons are Material Symbols Outlined codepoints (e000-efff), rendered via kitty symbol_map.
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os$directory$git_branch$git_status$nodejs$python$golang$rust$docker_context$cmd_duration$status $character"""

right_format = """
$time$battery$memory$jobs"""

[username]
show_always = false
style = "bold #{color13.strip}"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "bold #{color12.strip}"
format = "[$hostname]($style) "

[os]
disabled = false
style = "bold #{color12.strip}"
format = "[\ueb8e $system]($style) "

[character]
success_symbol = "[❯](bold #{color14.strip})"
error_symbol = "[✗](bold #{color1.strip})"
vimcmd_symbol = "[V](bold #{color14.strip})"

[directory]
style = "bold #{color13.strip}"
format = "[\ue2c7 $path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncation_symbol = "…/"
read_only = " RO"
read_only_style = "bold red"

[git_branch]
symbol = "\ue97a "
style = "bold #{color14.strip}"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold #{color10.strip}"
format = '([$all_status$ahead_behind]($style) )'

[nodejs]
style = "bold #{color10.strip}"
format = "[Node $version]($style) "

[python]
style = "bold #{color11.strip}"
format = "[Python $version]($style) "

[golang]
style = "bold #{color12.strip}"
format = "[Go $version]($style) "

[rust]
style = "bold #{color10.strip}"
format = "[Rust $version]($style) "

[docker_context]
style = "bold #{color12.strip}"
format = "[docker $context]($style) "

[cmd_duration]
min_time = 3
style = "bold #{color3.strip}"
format = "[\ue8b5 $duration]($style) "

[status]
style = "bold red"
symbol = "✗"
format = "[$symbol$status]($style) "

[battery]
disabled = false
full_symbol = "\ue1a4"
charging_symbol = "\uea0b"
discharging_symbol = "\ue1a4"

[memory]
disabled = false
threshold = 70
format = "[\ue322 $mem_used](bold #{color1.strip}) "

[jobs]
symbol = "✦"
style = "bold #{color12.strip}"

[time]
disabled = false
style = "bold #{color8.strip}"
format = "[\ue8b5 $time]($style) "
time_format = "%H:%M"

[line_break]
disabled = true
